<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Kitsunarr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-[#05080f] text-gray-300 font-sans h-screen flex flex-col items-center justify-center relative overflow-hidden">
    
    <div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-purple-900/20 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-96 h-96 bg-yellow-600/10 rounded-full blur-[100px]"></div>

    <div class="auth-panel w-full max-w-sm p-8 relative z-10">
        <div class="text-center mb-8 flex flex-col items-center">
            <img src="/static/img/Kitsunarr-logo-512x512.png" alt="Kitsunarr Logo" class="w-36 h-36 rounded-xl shadow-2xl border-2 border-yellow-500/40 object-cover aspect-square mb-6 transition-all duration-300 hover:shadow-[0_0_20px_rgba(255,215,0,0.5)]">
            <h1 class="text-3xl font-bold text-white tracking-wider mb-2">KITSUNARR</h1>
            <p class="text-sm text-yellow-500 font-medium tracking-widest uppercase">Proxy & Indexer</p>
        </div>

        <div id="error-box" class="hidden bg-red-900/20 border border-red-500 rounded p-3 mb-6 text-xs text-red-400 font-bold text-center"></div>

        <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
            <div>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-3 top-3.5 text-gray-600"></i>
                    <input type="text" id="username" required placeholder="Usuario" autocomplete="username" class="w-full bg-black border border-gray-700 focus:border-yellow-500 rounded p-3 pl-10 text-white text-sm outline-none transition shadow-inner">
                </div>
            </div>
            
            <div>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3 top-3.5 text-gray-600"></i>
                    <input type="password" id="password" required placeholder="Contraseña" autocomplete="current-password" class="w-full bg-black border border-gray-700 focus:border-yellow-500 rounded p-3 pl-10 text-white text-sm outline-none transition shadow-inner">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-3 px-4 rounded transition duration-300 glow-yellow mt-2 flex justify-center items-center">
                <i class="fa-solid fa-right-to-bracket mr-2"></i> Acceder
            </button>
        </form>
    </div>

    <script src="/static/js/views/auth.js"></script>
</body>
</html>
